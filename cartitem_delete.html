{% extends 'base/base.html' %}
{% block title %}Supprimer un produit{% endblock %}
{% block content %}
<h2>Confirmer la suppression</h2>
<p>Voulez-vous vraiment supprimer {{ object.product.name }} du panier ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'cart_detail' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
